services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: komun
      POSTGRES_PASSWORD: komun
      POSTGRES_DB: komun
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U komun"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgres://komun:komun@db:5432/komun
      BIND_ADDR: 0.0.0.0:3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
